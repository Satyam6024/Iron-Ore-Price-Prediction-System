data_ingestion:
  raw_data_path: PYTHON_EDA_PREPROCESS_IRON_ORE/Data_set_Iron.csv
  output_path: dvc_pipeline/data/raw/iron_ore_raw.csv
  report_path: dvc_pipeline/reports/ingestion_report.json
data_cleaning:
  input_path: dvc_pipeline/data/raw/iron_ore_raw.csv
  output_path: dvc_pipeline/data/processed/iron_ore_clean.csv
  report_path: dvc_pipeline/reports/cleaning_report.json
  keep_weekdays_only: true
feature_engineering:
  input_path: dvc_pipeline/data/processed/iron_ore_clean.csv
  output_path: dvc_pipeline/data/features/feature_dataset.csv
  train_output_path: dvc_pipeline/data/features/train.csv
  test_output_path: dvc_pipeline/data/features/test.csv
  feature_columns_path: dvc_pipeline/data/features/feature_columns.json
  report_path: dvc_pipeline/reports/feature_report.json
  date_column: Date
  target_column: Price
  lags:
  - 1
  - 2
  - 3
  - 5
  - 7
  - 14
  - 21
  - 30
  rolling_windows:
  - 7
  - 14
  - 30
feature_selection:
  train_input_path: dvc_pipeline/data/features/train.csv
  all_feature_columns_path: dvc_pipeline/data/features/feature_columns.json
  selected_columns_output_path: dvc_pipeline/data/features/selected_feature_columns.json
  report_path: dvc_pipeline/reports/feature_selection_report.json
  target_column: Price
  method: random_forest_importance
  top_k: 12
  random_state: 42
  n_estimators: 400
  mandatory_features:
  - Open
  - High
  - Low
  - Vol.
  - Change %
training:
  train_data_path: dvc_pipeline/data/features/train.csv
  test_data_path: dvc_pipeline/data/features/test.csv
  full_data_path: dvc_pipeline/data/features/feature_dataset.csv
  feature_columns_path: dvc_pipeline/data/features/selected_feature_columns.json
  date_column: Date
  target_column: Price
  test_size: 252
  model_name: ridge
  random_state: 42
  cv_splits: 5
  n_iter: 30
  n_jobs: -1
  fixed_params:
    model__alpha: 0.2196385372416547
  output_model_path: dvc_pipeline/models/final_model.joblib
  metrics_path: dvc_pipeline/reports/training_metrics.json
  predictions_path: dvc_pipeline/reports/test_predictions.csv
experiments:
  models:
  - ridge
  - random_forest
  - gradient_boosting
  - extra_trees
  n_iter_per_model: 10
  cv_splits: 3
  n_jobs: -1
  random_state: 42
  optimization_metric: test_rmse
  log_to_mlflow: true
  mlflow_experiment_name: IronOre_Experiments
  results_path: dvc_pipeline/reports/experiment_results.csv
  best_result_path: dvc_pipeline/reports/best_experiment.json
research_experiments:
  input_path: dvc_pipeline/data/processed/iron_ore_clean.csv
  date_column: Date
  target_column: Price
  test_size: 252
  lag_features:
  - 1
  - 2
  - 3
  - 5
  - 7
  - 14
  - 21
  - 30
  arima_order:
  - 5
  - 1
  - 0
  rolling_window: 30
  volatility_window: 14
  high_volatility_quantile: 0.75
  procurement_volume_tons: 10000
  arima_lstm:
    sequence_length: 30
    hidden_size: 32
    num_layers: 2
    dropout: 0.1
    learning_rate: 0.001
    batch_size: 32
    epochs: 80
    validation_ratio: 0.15
    patience: 12
    history_path: dvc_pipeline/reports/arima_lstm_history.json
  results_path: dvc_pipeline/reports/research_experiment_results.csv
  summary_path: dvc_pipeline/reports/research_experiment_summary.json
  predictions_path: dvc_pipeline/reports/research_predictions.csv
workflow:
  params_update_report_path: dvc_pipeline/reports/params_update_report.json
mlflow:
  tracking_uri: file:./dvc_pipeline/mlruns
  registry_uri: file:./dvc_pipeline/mlruns
  experiment_name: IronOre_DVC_Pipeline
registry:
  model_name: IronOrePriceModel
  registration_output_path: dvc_pipeline/reports/registry_registration.json
  promotion_output_path: dvc_pipeline/reports/registry_promotion.json
  testing_alias: testing
  staging_alias: staging
  production_alias: production
  wait_timeout_sec: 180
  gates:
    testing:
      max_test_rmse: 0.5
      max_test_mape: 0.01
      min_test_r2: 0.99
    staging:
      max_rmse_drift_pct: 20.0
      max_mape: 0.01
      min_r2: 0.99
deployment:
  output_dir: dvc_pipeline/deploy
  deployed_model_path: dvc_pipeline/deploy/model.joblib
  deployed_feature_columns_path: dvc_pipeline/deploy/feature_columns.json
  manifest_path: dvc_pipeline/deploy/deployment_manifest.json
